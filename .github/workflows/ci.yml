name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        run: docker build -t events-api:latest .

      - name: Start container
        run: docker run -d -p 5000:5000 --name events-api events-api:latest

      - name: Wait for container to be healthy
        run: |
          for i in $(seq 1 30); do                                                                                                                                                  
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' events-api)                                                                                                 
            echo "Attempt $i: $STATUS"                                                                                                                                              
            [ "$STATUS" = "healthy" ] && exit 0                                                                                                                                     
            [ "$STATUS" = "unhealthy" ] && docker logs events-api && exit 1                                                                                                         
            sleep 2                                                                                                                                                                 
          done                                                                                                                                                                      
          docker logs events-api                                                                                                                                                    
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -v

      - name: Stop container
        if: always()
        run: docker stop events-api

      - name: Remove container
        if: always()
        run: docker rm events-api