name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        run: docker build -t events-api:latest .

      - name: Start container
        run: docker run -d -p 5000:5000 --name events-api events-api:latest

      - name: Wait for container to be healthy
        run: |
          for i in $(seq 1 30); do                                                                                                                                                  
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' events-api)                                                                                                 
            echo "Attempt $i: $STATUS"                                                                                                                                              
            [ "$STATUS" = "healthy" ] && exit 0                                                                                                                                     
            [ "$STATUS" = "unhealthy" ] && docker logs events-api && exit 1                                                                                                         
            sleep 2                                                                                                                                                                 
          done                                                                                                                                                                      
          docker logs events-api                                                                                                                                                    
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -v

      - name: Stop container
        if: always()
        run: docker stop events-api

      - name: Remove container
        if: always()
        run: docker rm events-api

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker
        uses: docker/setup-buildx-action@v4

      - name: Docker Hub Login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image to Docker Hub
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/events-api:latest \
                       -t ${{ secrets.DOCKERHUB_USERNAME }}/events-api:${{ github.sha }} .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/events-api:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/events-api:${{ github.sha }}

      - name: Trigger Render Deploy
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Smoke Test (wait for Render)
        run: |
          echo "Polling ${{ secrets.RENDER_BASE_URL }}/api/health ..."
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_BASE_URL }}/api/health")
            echo "Attempt $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && exit 0
            sleep 15
          done
          echo "Render did not respond with 200 after 5 minutes — deploy failed"
          exit 1